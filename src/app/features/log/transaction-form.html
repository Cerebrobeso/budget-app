<form class="flex flex-col gap-4" (submit)="$event.preventDefault(); save()">
  <!-- Importo: il campo protagonista -->
  <div>
    <label hlmLabel for="tx-amount">Importo</label>
    <div class="relative">
      <input
        hlmInput
        id="tx-amount"
        name="amount"
        type="number"
        inputmode="decimal"
        step="0.01"
        min="0"
        required
        autocomplete="off"
        placeholder="0,00"
        class="figure !h-16 !text-3xl font-semibold pr-12 text-right"
        [class.!text-income]="type() === 'income'"
        [class.!text-expense]="type() === 'expense'"
        [ngModel]="amount()"
        (ngModelChange)="amount.set($event)"
        #amountInput
      />
      <span class="figure absolute right-4 top-1/2 -translate-y-1/2 text-xl text-muted-foreground">€</span>
    </div>
  </div>

  <!-- Tipo -->
  <div class="grid grid-cols-2 gap-2" role="radiogroup" aria-label="Tipo di movimento">
    <button
      type="button"
      hlmBtn
      variant="outline"
      [class]="type() === 'expense' ? 'bg-expense hover:bg-expense text-white border-transparent hover:opacity-90' : ''"
      (click)="setType('expense')"
    >
      Uscita
    </button>
    <button
      type="button"
      hlmBtn
      variant="outline"
      [class]="type() === 'income' ? 'bg-income hover:bg-income text-white border-transparent hover:opacity-90' : ''"
      (click)="setType('income')"
    >
      Entrata
    </button>
  </div>

  <!-- Categoria + sottocategoria -->
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    <div>
      <label hlmLabel for="tx-category">Categoria</label>
      <div hlmSelect [value]="categoryId()" (valueChange)="onCategoryChange($event)" [itemToString]="categoryLabel">
        <hlm-select-trigger buttonId="tx-category" class="w-full">
          <span hlmSelectValue placeholder="Scegli categoria"></span>
        </hlm-select-trigger>
        <hlm-select-content *hlmSelectPortal>
          @for (cat of availableCategories(); track cat.id) {
            <hlm-select-item [value]="cat.id">
              <span class="mr-2 inline-block size-2.5 rounded-full" [style.background]="cat.color"></span>
              {{ cat.name }}
            </hlm-select-item>
          }
        </hlm-select-content>
      </div>
    </div>
    <div>
      <label hlmLabel for="tx-subcategory">Sottocategoria</label>
      <div hlmSelect [value]="subcategoryId()" (valueChange)="onSubChange($event)" [disabled]="subs().length === 0" [itemToString]="subcategoryLabel">
        <hlm-select-trigger buttonId="tx-subcategory" class="w-full">
          <span hlmSelectValue placeholder="—"></span>
        </hlm-select-trigger>
        <hlm-select-content *hlmSelectPortal>
          @for (sub of subs(); track sub.id) {
            <hlm-select-item [value]="sub.id">{{ sub.name }}</hlm-select-item>
          }
        </hlm-select-content>
      </div>
    </div>
  </div>

  <!-- Data + descrizione -->
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
    <div>
      <label hlmLabel for="tx-date">Data</label>
      <input hlmInput id="tx-date" name="date" type="date" required
             [ngModel]="date()" (ngModelChange)="date.set($event)" />
    </div>
    <div>
      <label hlmLabel for="tx-desc">Descrizione <span class="normal-case font-normal">(opzionale)</span></label>
      <input hlmInput id="tx-desc" name="description" type="text" autocomplete="off"
             placeholder="Es. Spesa, benzina…"
             [ngModel]="description()" (ngModelChange)="description.set($event)" />
    </div>
  </div>

  @if (error()) {
    <p class="text-sm text-expense" role="alert">{{ error() }}</p>
  }

  <button hlmBtn size="lg" type="submit" class="w-full font-display font-bold">
    {{ editing() ? 'Salva modifiche' : 'Aggiungi movimento' }}
  </button>
</form>
