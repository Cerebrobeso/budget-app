<hlm-popover align="start" sideOffset="6" [state]="state()" (stateChanged)="onStateChange($event)">
  <button
    hlmPopoverTrigger
    type="button"
    [attr.id]="buttonId() ?? null"
    class="shrink-0 cursor-pointer rounded-full border border-border shadow-sm transition-transform hover:scale-105 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
    [class.size-8]="size() === 'default'"
    [class.size-5]="size() === 'sm'"
    [style.background]="color()"
    [attr.aria-label]="ariaLabel() ?? ('Colore: ' + color())"
  ></button>

  <hlm-popover-content class="w-72" *hlmPopoverPortal="let ctx">
    <p class="mb-1.5 text-sm font-semibold uppercase tracking-wider text-muted-foreground">Colore</p>
    <div class="grid grid-cols-6 gap-2">
      @for (swatch of presets; track swatch) {
        <button
          type="button"
          class="relative size-7 shrink-0 cursor-pointer rounded-full border transition-transform hover:scale-110"
          [class]="isActive(swatch) ? 'border-foreground' : 'border-transparent'"
          [style.background]="swatch"
          [attr.title]="isUsed(swatch) ? swatch + ' — già usato da un\'altra categoria' : swatch"
          [attr.aria-label]="'Seleziona ' + swatch"
          (click)="choose(swatch)"
        >
          @if (isActive(swatch)) {
            <ng-icon name="lucideCheck" class="absolute inset-0 m-auto text-white drop-shadow" size="14" />
          } @else if (isUsed(swatch)) {
            <span class="absolute -end-0.5 -bottom-0.5 size-2.5 rounded-full border-2 border-popover bg-foreground/60"></span>
          }
        </button>
      }
    </div>

    <div class="mt-3 flex items-center gap-2 border-t border-border pt-3">
      <span
        class="size-6 shrink-0 rounded-full border border-dashed border-border"
        [style.background]="draftPreview() ?? 'transparent'"
      ></span>
      <input
        hlmInput
        class="h-8 flex-1 font-mono text-sm uppercase"
        type="text"
        placeholder="#2E46D1"
        maxlength="7"
        [ngModel]="draft()"
        (ngModelChange)="onDraftChange($event)"
        (keydown.enter)="applyDraft()"
      />
    </div>
  </hlm-popover-content>
</hlm-popover>
