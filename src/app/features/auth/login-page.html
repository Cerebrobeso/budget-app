<div class="mx-auto flex min-h-dvh w-full max-w-sm flex-col justify-center px-4 py-8">
  <a routerLink="/" class="mb-8 text-center font-display text-3xl font-extrabold tracking-tight">
    Registro<span class="text-primary">.</span>
  </a>

  <div hlmCard class="p-6">
    <h1 class="mb-1 font-display text-xl font-bold">Accedi</h1>
    <p class="mb-5 text-sm text-muted-foreground">Inserisci le tue credenziali per continuare.</p>

    <form class="flex flex-col gap-4" (submit)="$event.preventDefault(); submit()">
      <div>
        <label hlmLabel for="login-email">Email</label>
        <input
          hlmInput
          id="login-email"
          name="email"
          type="email"
          autocomplete="email"
          required
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
        />
      </div>
      <div>
        <label hlmLabel for="login-password">Password</label>
        <input
          hlmInput
          id="login-password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
        />
      </div>

      @if (error()) {
        <p class="text-sm text-expense" role="alert">{{ error() }}</p>
      }

      <button hlmBtn size="lg" type="submit" class="mt-1 w-full font-display font-bold" [disabled]="loading()">
        @if (loading()) {
          <hlm-spinner />
          Accesso in corso…
        } @else {
          Accedi
        }
      </button>
    </form>
  </div>
</div>
