@if (!auth.ready()) {
  <div class="flex min-h-dvh items-center justify-center">
    <hlm-spinner class="!text-[length:2rem] text-muted-foreground" aria-label="Accesso in corso" />
  </div>
} @else if (auth.user()) {
  @if (navigating()) {
    <div class="fixed inset-x-0 top-0 z-50 h-0.5 overflow-hidden bg-primary/15">
      <div class="route-progress-bar h-full w-1/3 rounded-full bg-primary"></div>
    </div>
  }
  <div class="mx-auto flex min-h-dvh w-full max-w-5xl flex-col px-4 pb-24 md:pb-8">
    <header class="flex items-center justify-between py-4">
      <a routerLink="/movimenti" class="font-display text-2xl font-extrabold tracking-tight">
        Registro<span class="text-primary">.</span>
      </a>
      <div class="flex items-center gap-2">
        <nav class="hidden md:flex items-center gap-1 mr-2" aria-label="Sezioni">
          @for (link of links; track link.path) {
            <a
              [routerLink]="link.path"
              routerLinkActive="!bg-foreground !text-background"
              class="rounded-full px-4 py-2 text-sm font-medium hover:bg-muted transition-colors"
            >{{ link.label }}</a>
          }
        </nav>
        <button hlmBtn variant="outline" size="icon" (click)="theme.toggle()"
                [attr.aria-label]="theme.dark() ? 'Passa al tema chiaro' : 'Passa al tema scuro'">
          @if (theme.dark()) { <ng-icon name="lucideSun" /> } @else { <ng-icon name="lucideMoon" /> }
        </button>
        <button hlmBtn variant="outline" size="icon" (click)="logout()" aria-label="Esci"><ng-icon name="lucideLogOut" /></button>
        <button hlmBtn class="hidden md:inline-flex font-semibold" (click)="openQuickAdd()">
          <ng-icon name="lucidePlus" class="mr-1" /> Nuovo <kbd class="figure ml-1 rounded bg-black/15 px-1.5 text-xs">N</kbd>
        </button>
      </div>
    </header>

    <main class="flex-1">
      @if (dataReady()) {
        <div [class.route-fade-a]="routeAnimToggle()" [class.route-fade-b]="!routeAnimToggle()">
          <router-outlet (activate)="onRouteActivate()" />
        </div>
      } @else {
        <div class="flex items-center justify-center py-24">
          <hlm-spinner class="!text-[length:2rem] text-muted-foreground" aria-label="Caricamento dati" />
        </div>
      }
    </main>
  </div>

  <!-- Nav mobile in basso -->
  <nav
    class="fixed inset-x-0 bottom-0 z-40 flex justify-around border-t border-border bg-surface/95 backdrop-blur
           pb-[max(0.5rem,env(safe-area-inset-bottom))] pt-2 md:hidden"
    aria-label="Sezioni"
  >
    @for (link of links; track link.path) {
      <a
        [routerLink]="link.path"
        routerLinkActive="!text-primary font-bold"
        class="flex flex-col items-center gap-0.5 px-3 py-1 text-[11px] font-medium text-muted-foreground"
      >
        <ng-icon [name]="link.icon" size="20" aria-hidden="true" />
        {{ link.label }}
      </a>
    }
  </nav>

  <!-- FAB mobile -->
  <button
    hlmBtn
    size="icon"
    class="fixed bottom-20 right-4 z-40 shadow-xl shadow-primary/30 md:hidden"
    aria-label="Aggiungi movimento"
    (click)="openQuickAdd()"
  ><ng-icon name="lucidePlus" /></button>

  <!-- Dialog inserimento rapido, disponibile ovunque -->
  <hlm-dialog #quickAdd="hlmDialog" closeDelay="100">
    <hlm-dialog-content *hlmDialogPortal>
      <h2 hlmDialogTitle class="mb-4 text-xl font-display font-bold">Nuovo movimento</h2>
      <app-transaction-form (saved)="quickAdd.close({})" />
    </hlm-dialog-content>
  </hlm-dialog>
} @else {
  <router-outlet />
}
