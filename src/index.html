<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>Registro — Finanze personali</title>
  <base href="/">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#F7F6F2">
  <!-- Add to Home Screen su iOS: apre a schermo intero senza la UI di Safari -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Registro">
  <style>html{background:#f7f6f2}html.dark{background:#10151a}</style>
  <script>
    // Applica il tema prima del primo paint per evitare il flash bianco/chiaro.
    try {
      var t = localStorage.getItem('registro.theme');
      var dark = t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) {
        document.documentElement.classList.add('dark');
        document.querySelector('meta[name="theme-color"]').content = '#10151A';
      }
    } catch (e) {}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Spline+Sans+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <app-root></app-root>
</body>
</html>
