name: CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Placeholder: qui non serve un progetto Supabase reale, solo che il
      # modulo esista con la forma giusta perché ng build/tsc compilino.
      - name: Genera environment placeholder
        run: |
          mkdir -p src/environments
          cat > src/environments/environment.ts <<EOF
          export const environment = {
            production: true,
            supabaseUrl: 'https://placeholder.supabase.co',
            supabaseAnonKey: 'placeholder-anon-key',
          };
          EOF

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Build
        run: npx ng build
