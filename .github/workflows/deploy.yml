name: Deploy su GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permessi necessari per pubblicare su Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy alla volta
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      # Genera gli environment dai Secrets: le chiavi non sono nel repo,
      # vengono iniettate qui, solo per la durata della build. La versione
      # viene letta da package.json, cosi' non va tenuta in sync a mano.
      - name: Genera environment
        run: |
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p src/environments
          cat > src/environments/environment.ts <<EOF
          export const environment = {
            production: false,
            appVersion: '${VERSION}',
            supabaseUrl: '${{ secrets.SUPABASE_URL }}',
            supabaseAnonKey: '${{ secrets.SUPABASE_ANON_KEY }}',
          };
          EOF
          cat > src/environments/environment.production.ts <<EOF
          export const environment = {
            production: true,
            appVersion: '${VERSION}',
            supabaseUrl: '${{ secrets.SUPABASE_URL }}',
            supabaseAnonKey: '${{ secrets.SUPABASE_ANON_KEY }}',
          };
          EOF

      - name: Test
        run: npx ng test

      - name: Build
        run: npx ng build --base-href "/${{ github.event.repository.name }}/"

      # SPA su Pages: copia index.html in 404.html così le route lato client
      # non danno 404 al refresh o all'accesso diretto.
      - name: Fallback SPA (404.html)
        run: cp dist/budget-app/browser/index.html dist/budget-app/browser/404.html

      # Evita che Pages processi l'output con Jekyll (che ignora file/_cartelle con underscore)
      - name: Disabilita Jekyll
        run: touch dist/budget-app/browser/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/budget-app/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
